AWSTemplateFormatVersion: '2010-09-09'
Description: Simple EC2 Instance Creation

Resources:
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0c55b159cbfafe1f0   # Example Amazon Linux AMI (change as per region)
      KeyName: my-keypair-name        # Replace with your key pair